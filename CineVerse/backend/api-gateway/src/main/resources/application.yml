server:
  port: 8081

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: movie-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/movies/**
          filters:
            - StripPrefix=1
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/booking/**
          filters:
            - StripPrefix=1

app:
  jwt-secret: auth-service-secret-key-should-be-changed-in-production-123456
